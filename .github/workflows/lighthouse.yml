name: Web Performance Benchmark (Multi-Region)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

concurrency:
  group: webperf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: "清华主页"
            url: "https://www.tsinghua.edu.cn"
          - name: "清华深圳国际研究生院"
            url: "https://www.sigs.tsinghua.edu.cn"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Performance Measurement (3x for multi-region)
        run: node scripts/measure_performance.js
        env:
          TARGET_URL: ${{ matrix.target.url }}
          TARGET_NAME: ${{ matrix.target.name }}
          NUM_RUNS: '3'

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results-${{ matrix.target.name }}-${{ github.run_id }}
          path: ./data/*.json
          retention-days: 1

  aggregate:
    needs: lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean old results
        run: rm -rf ./results && mkdir ./results

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./results
          pattern: lighthouse-results-*
          merge-multiple: true

      - name: Install Python dependencies
        run: pip install pandas tabulate -q

      - name: Generate summary report
        run: python3 scripts/aggregate_results.py
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary-${{ github.run_id }}
          path: benchmark_summary.csv
          retention-days: 90